<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT: Journal of Professional Inutile Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 报纸/学术期刊质感样式 */
        body { font-family: "Times New Roman", STSong, "SimSun", serif; background-color: #f4f4f2; color: #1c1c1c; max-width: 1100px; margin: 0 auto; padding: 40px 20px; line-height: 1.7; }
        h1, h2, h3 { font-weight: 700; color: #111; }
        .header-title { text-align: center; border-bottom: 5px double #1c1c1c; padding-bottom: 20px; margin-bottom: 40px; }
        .nav { text-align: center; margin-bottom: 50px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #1c1c1c; padding-bottom: 10px; }
        .nav a { margin: 0 20px; text-decoration: none; color: #1c1c1c; transition: 0.3s; }
        .nav a:hover { background: #e3e3e0; }

        .layout-wrapper { display: flex; flex-wrap: wrap; gap: 40px; }
        .main-col { flex: 2; min-width: 320px; }
        .side-col { flex: 1.2; min-width: 320px; border-left: 2px solid #1c1c1c; padding-left: 30px; }

        .section-title { border-top: 2px solid #1c1c1c; border-bottom: 2px solid #1c1c1c; padding: 10px 0; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; background: #eee; padding: 5px 15px; }

        /* 文献卡片样式 */
        .paper-item { margin-bottom: 30px; padding: 20px; background: #fff; border: 1px solid #ddd; box-shadow: 5px 5px 0px #eee; transition: 0.3s; }
        .paper-item:hover { box-shadow: 8px 8px 0px #ddd; }
        .paper-title { font-size: 1.3rem; font-weight: bold; cursor: pointer; color: #000; display: block; margin-bottom: 10px; }
        .paper-author { font-style: italic; font-size: 0.9rem; color: #555; margin-bottom: 10px; }
        
        /* 按钮样式 */
        button { padding: 8px 16px; background: #1c1c1c; color: #f4f4f2; border: 1px solid #1c1c1c; font-weight: bold; cursor: pointer; font-family: inherit; }
        button:hover { background: #f4f4f2; color: #1c1c1c; }
        button:disabled { background: #ccc; border-color: #ccc; color: #666; cursor: not-allowed; }

        /* 天坑论坛模块 */
        .forum-module { border: 2px solid #1c1c1c; background-color: #ebebe8; padding: 15px; margin-bottom: 20px; cursor: pointer; }
        .forum-module:hover { background-color: #e3e3e0; }
        .progress-container { width: 100%; height: 18px; border: 2px solid #1c1c1c; background: #fff; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: #1c1c1c; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .comment-section { display: none; margin-top: 15px; border-top: 1px dashed #1c1c1c; padding-top: 15px; cursor: default; }
        .hot-comment { font-size: 0.9rem; background: #fff; padding: 10px; border: 1px solid #ccc; font-style: italic; margin-bottom: 10px; }

        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 10px; border: 1px solid #1c1c1c; font-family: inherit; }
        dialog { border: 5px solid #1c1c1c; background: #f4f4f2; padding: 30px; width: 90%; max-width: 650px; box-shadow: 15px 15px 0px rgba(0,0,0,0.2); }
        dialog::backdrop { background: rgba(0,0,0,0.7); }
    </style>
</head>
<body>

    <div class="header-title">
        <h1 style="font-size: 3rem; margin-bottom: 10px;">PIT: Journal of Professional Inutile Training</h1>
        <p style="font-size: 1.3rem; font-weight: bold; margin: 5px 0;">PIT: 天坑专业收容所</p>
        <p style="font-size: 0.9rem; color: #444; letter-spacing: 2px;">ISSN 0000-0250 | Est. 2026 | 全球学术牛马实时互助平台</p>
    </div>

    <div class="nav">
        <a href="#papers">Literature / 最新文献</a>
        <a href="#forum">Pit Index / 天坑论坛</a>
    </div>

    <div class="layout-wrapper">
        <div class="main-col" id="papers">
            <div class="section-title">
                <h2 style="margin:0; font-size: 1.2rem;">Current Issue / 最新文献</h2>
                <button onclick="document.getElementById('submitModal').showModal()">投稿直发 / Submit</button>
            </div>
            <div id="papers-container">📡 正在从学术垃圾桶中检索文献...</div>
        </div>

        <div class="side-col" id="forum">
            <div class="section-title">
                <h2 style="margin:0; font-size: 1.2rem;">Pit Index / 天坑论坛</h2>
            </div>
            <div id="loading-msg" style="font-style:italic;">📡 同步全球学术牛马数据...</div>
            <div id="forum-container"></div>
        </div>
    </div>

    <dialog id="submitModal">
        <h3 style="margin-top:0; border-bottom: 2px solid #000;">向天坑期刊投稿 (免审直发)</h3>
        <p style="font-size: 0.85rem; color: #b22222;">注：本刊不录用任何有实际学术价值的内容。</p>
        <input type="text" id="p-title" placeholder="Title / 论文标题 (例: 论导师画饼的营养价值分析)">
        <input type="text" id="p-author" placeholder="Author / 作者 (例: 匿名牛马)">
        <textarea id="p-content" rows="8" placeholder="Full Text / 论文正文 (请尽情发疯)"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="submitPaper()" id="btn-submit" style="flex:2;">立即发布 / Publish</button>
            <button onclick="document.getElementById('submitModal').close()" style="background:#888; border-color:#888; flex:1;">闭嘴</button>
        </div>
    </dialog>

    <script>
        // --- Supabase 配置 ---
        const supabaseUrl = 'https://lbuhtjezlkirkxbfgwvt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxidWh0amV6bGtpcmt4YmZnd3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk0OTksImV4cCI6MjA4ODExNTQ5OX0.dBP_u7PXyy9D_mCYGYDkDzvOArDBcQ6Qf8FO0wdO5lg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 1. 获取文献
        async function fetchPapers() {
            const { data, error } = await _supabase.from('pit_papers').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('papers-container');
            if (error) { container.innerHTML = "检索失败，可能是实验室断网了。"; return; }
            
            container.innerHTML = (data && data.length) ? '' : '<p>暂无发疯记录。</p>';
            data?.forEach(p => {
                const hasLiked = localStorage.getItem('liked_paper_' + p.id);
                container.innerHTML += `
                    <div class="paper-item">
                        <div class="paper-title">📄 ${p.title}</div>
                        <div class="paper-author">Author: ${p.author}</div>
                        <p style="white-space: pre-wrap;">${p.content}</p>
                        <button onclick="likePaper(${p.id}, ${p.likes})" ${hasLiked ? 'disabled' : ''}>
                            🔥 引用/赞 (${p.likes}) ${hasLiked ? '✓' : ''}
                        </button>
                    </div>`;
            });
        }

        // 2. 获取论坛
        async function fetchForum() {
            const { data: forums } = await _supabase.from('pit_forum').select('*').order('id');
            const { data: comments } = await _supabase.from('pit_comments').select('*').order('likes', { ascending: false });
            const container = document.getElementById('forum-container');
            document.getElementById('loading-msg').style.display = 'none';
            container.innerHTML = '';
            
            forums?.forEach(f => {
                const hasCommented = localStorage.getItem('pit_voted_' + f.id);
                // 找出该专业的点赞最高的一条评论
                const topComment = comments?.find(c => c.major_id === f.id);
                
                container.innerHTML += `
                    <div class="forum-module" onclick="toggleComment('${f.id}')">
                        <div style="font-weight: bold;">${f.name}</div>
                        <div style="font-size: 0.85rem; margin-top:5px;">坑深进度: -${f.count} / -250</div>
                        <div class="progress-container"><div class="progress-bar" style="width:${Math.min((f.count/250)*100, 100)}%"></div></div>
                        
                        <div class="comment-section" id="sec_${f.id}" onclick="event.stopPropagation()">
                            <div class="hot-comment">
                                ${topComment ? `“${topComment.content}”` : '暂无发疯记录。'}
                            </div>
                            <textarea id="input_${f.id}" placeholder="${hasCommented ? '科研牛马请立刻回实验室刷烧杯。' : '记录你的翻车日常，坑深 -1...'}"></textarea>
                            <button onclick="submitComment('${f.id}', ${f.count})" style="width:100%;" ${hasCommented?'disabled':''}>
                                ${hasCommented ? '🕳 已经入坑' : '🧱 纵身跳坑 -1'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        // 交互逻辑
        function toggleComment(id) {
            const el = document.getElementById('sec_' + id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        async function submitPaper() {
            const title = document.getElementById('p-title').value.trim();
            const author = document.getElementById('p-author').value.trim();
            const content = document.getElementById('p-content').value.trim();
            if(!title || !content) return alert("写全啊，牛马！");

            const btn = document.getElementById('btn-submit');
            btn.innerText = "正在塞进垃圾桶..."; btn.disabled = true;

            await _supabase.from('pit_papers').insert([{ title, author: author || '匿名牛马', content, abstract: '无' }]);
            location.reload(); 
        }

        async function submitComment(id, currentCount) {
            const val = document.getElementById('input_' + id).value.trim();
            if(!val) return;
            
            await _supabase.from('pit_comments').insert([{ major_id: id, content: val }]);
            await _supabase.from('pit_forum').update({ count: currentCount + 1 }).eq('id', id);
            
            localStorage.setItem('pit_voted_' + id, 'true');
            location.reload();
        }

        async function likePaper(id, currentLikes) {
            await _supabase.from('pit_papers').update({ likes: currentLikes + 1 }).eq('id', id);
            localStorage.setItem('liked_paper_' + id, 'true');
            fetchPapers(); // 局部刷新
        }

        window.onload = () => { fetchPapers(); fetchForum(); };
    </script>
</body>
</html>
