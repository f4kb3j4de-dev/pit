<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT: Journal of Professional Inutile Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: "Times New Roman", STSong, "SimSun", serif; background-color: #f4f4f2; color: #1c1c1c; max-width: 1000px; margin: 0 auto; padding: 50px 20px; line-height: 1.7; }
        h1, h2, h3, h4 { font-weight: 700; letter-spacing: 0.5px; color: #111; }
        .header-title { text-align: center; border-bottom: 4px solid #1c1c1c; padding-bottom: 20px; margin-bottom: 40px; }
        a { color: #1c1c1c; text-decoration: none; transition: all 0.2s ease; }
        a:hover { background-color: #e3e3e0; }
        .nav { text-align: center; margin-bottom: 60px; font-size: 1.05rem; font-weight: bold; text-transform: uppercase; }
        .nav a { margin: 0 15px; border-bottom: 1px solid #1c1c1c; padding-bottom: 2px; }
        
        .hero { text-align: center; margin: 60px 0; padding: 60px 20px; border: 4px solid #1c1c1c; background-color: #ebebe8; box-shadow: 8px 8px 0px #1c1c1c; }
        .hero h2 { font-size: 2.8rem; margin: 0; line-height: 1.2; text-transform: uppercase; }
        
        .layout-wrapper { display: flex; flex-wrap: wrap; gap: 40px; margin-top: 50px; }
        .main-col { flex: 2; min-width: 300px; }
        .side-col { flex: 1; min-width: 320px; border-left: 2px solid #1c1c1c; padding-left: 30px; }
        
        .section-title { border-top: 2px solid #1c1c1c; border-bottom: 2px solid #1c1c1c; padding: 10px 0; margin-bottom: 30px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center;}
        
        /* 文献列表样式 */
        .paper-item { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #ccc; cursor: pointer; transition: background 0.2s; padding: 15px;}
        .paper-item:hover { background-color: #ebebe8; }
        .paper-title { font-size: 1.2rem; margin-bottom: 5px; color: #111;}
        .paper-author { font-style: italic; font-size: 0.9rem; margin-top: 0; color: #555; }
        .abstract { font-size: 0.95rem; margin-top: 10px; color: #444; }

        .interactive-box { margin: 40px 0; padding: 20px; border: 2px solid #1c1c1c; background-color: #fafafa; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        button { padding: 8px 15px; background: #1c1c1c; color: #f4f4f2; border: 1px solid #1c1c1c; font-weight: bold; cursor: pointer; font-size: 0.85rem; font-family: inherit; text-transform: uppercase;}
        button:hover { background: #f4f4f2; color: #1c1c1c; box-shadow: 2px 2px 0px #1c1c1c; }
        input[type="text"], textarea { border: 1px solid #1c1c1c; background-color: #fff; padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px;}

        /* 论坛样式 */
        .forum-module { border: 2px solid #1c1c1c; background-color: #ebebe8; padding: 15px; margin-bottom: 20px; cursor: pointer; position: relative;}
        .progress-container { width: 100%; height: 20px; border: 2px solid #1c1c1c; background: #fff; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #1c1c1c; transition: width 0.5s ease; }
        .comment-section { display: none; margin-top: 15px; border-top: 1px dashed #1c1c1c; padding-top: 15px; }
        .comment-list { font-size: 0.9rem; color: #444; margin-bottom: 10px; font-style: italic; background: #fff; padding: 10px; border: 1px solid #ccc; }

        /* 弹窗样式 (Modal) */
        dialog { border: 4px solid #1c1c1c; background: #f4f4f2; padding: 30px; max-width: 600px; width: 90%; box-shadow: 10px 10px 0px #1c1c1c; font-family: inherit; }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); }
        .close-btn { background: transparent; color: #1c1c1c; border: none; box-shadow: none; float: right; font-size: 1.2rem; margin-top: -20px; margin-right: -20px;}
        .close-btn:hover { background: transparent; box-shadow: none; color: red;}
    </style>
</head>
<body>

    <div class="header-title">
        <h1 style="font-size: 2.8rem; margin-bottom: 5px;">PIT: Journal of Professional Inutile Training</h1>
        <p style="margin-top: 0; font-size: 1.2rem; font-weight: bold;">PIT: 天坑专业收容所</p>
        <p style="font-size: 0.85rem; color: #444; text-transform: uppercase; letter-spacing: 1px;">ISSN 0000-0250 | Est. 2026 | Peer-Reviewed Nonsense</p>
    </div>

    <div class="nav">
        <a href="#current-issue">Literature / 最新文献</a>
        <a href="#pit-index">Pit Index / 天坑论坛</a>
    </div>

    <div class="layout-wrapper">
        <div class="main-col">
            <div class="section-title">
                <h2 style="margin:0;">Current Issue / 最新文献</h2>
                <button onclick="document.getElementById('submitModal').showModal()">Submit Paper / 投稿</button>
            </div>
            
            <div id="loading-papers" style="font-style:italic; color:#666;">📡 正在从学术垃圾桶中检索文献...</div>
            
            <div id="papers-container"></div>
        </div>

        <div class="side-col">
            <h2 id="pit-index" class="section-title" style="margin-top: 0;">Pit Index / 天坑论坛</h2>
            <div id="loading-msg">📡 正在同步全球学术牛马数据...</div>
            <div id="forum-container"></div>
        </div>
    </div>

    <dialog id="submitModal">
        <button class="close-btn" onclick="document.getElementById('submitModal').close()">✖</button>
        <h3 style="margin-top:0;">Submit to PIT / 向天坑期刊投稿</h3>
        <p style="font-size: 0.9rem; color: #555;">投稿后将进入编辑部（站长）盲审阶段，通过后方可全网发布。</p>
        <input type="text" id="p-title" placeholder="Title / 论文标题 (例: 论导师的画饼艺术)">
        <input type="text" id="p-author" placeholder="Author / 作者 (例: 匿名怨种)">
        <textarea id="p-abstract" rows="2" placeholder="Abstract / 摘要"></textarea>
        <textarea id="p-content" rows="6" placeholder="Full Text / 论文正文 (尽情发疯)"></textarea>
        <button onclick="submitPaper()" id="btn-submit" style="width:100%; margin-top:10px;">Submit for Review / 提交盲审</button>
    </dialog>

    <dialog id="readModal">
        <button class="close-btn" onclick="document.getElementById('readModal').close()">✖</button>
        <h2 id="read-title" style="margin-top:0; border-bottom: 2px solid #1c1c1c; padding-bottom: 10px;"></h2>
        <p id="read-author" style="font-style: italic; color: #555;"></p>
        <div style="background: #ebebe8; padding: 15px; border-left: 4px solid #1c1c1c; margin-bottom: 20px;">
            <strong>Abstract / 摘要：</strong><br>
            <span id="read-abstract"></span>
        </div>
        <div id="read-content" style="line-height: 1.8; white-space: pre-wrap;"></div>
    </dialog>

    <script>
        // --- 填入你的 Supabase 配置 ---
        const supabaseUrl = 'https://lbuhtjezlkirkxbfgwvt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxidWh0amV6bGtpcmt4YmZnd3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk0OTksImV4cCI6MjA4ODExNTQ5OX0.dBP_u7PXyy9D_mCYGYDkDzvOArDBcQ6Qf8FO0wdO5lg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        /* ================= 1. 文献系统逻辑 ================= */
        let papersData = [];

        // 拉取已过审的文献
        async function fetchPapers() {
            const { data, error } = await _supabase.from('pit_papers').select('*').order('created_at', { ascending: false });
            if (error) {
                console.error("加载文献失败", error);
                document.getElementById('loading-papers').innerText = "加载失败，请检查数据库配置。";
                return;
            }
            papersData = data;
            document.getElementById('loading-papers').style.display = 'none';
            renderPapers();
        }

        // 渲染文献列表
        function renderPapers() {
            const container = document.getElementById('papers-container');
            container.innerHTML = '';
            
            if(papersData.length === 0) {
                container.innerHTML = "<p>当前暂无已发表的学术垃圾。</p>";
                return;
            }

            papersData.forEach((paper, index) => {
                container.innerHTML += `
                    <div class="paper-item" onclick="openPaper(${index})">
                        <div class="paper-title">📄 ${paper.title}</div>
                        <p class="paper-author">Author: ${paper.author}</p>
                        <div class="abstract"><strong>摘要预览:</strong> ${paper.abstract.substring(0, 60)}... <span style="color:#0000ee; text-decoration:underline;">[Click to Read / 点击阅读全文]</span></div>
                    </div>
                `;
            });
        }

        // 打开文献阅读弹窗
        function openPaper(index) {
            const paper = papersData[index];
            document.getElementById('read-title').innerText = paper.title;
            document.getElementById('read-author').innerText = "Author: " + paper.author;
            document.getElementById('read-abstract').innerText = paper.abstract;
            document.getElementById('read-content').innerText = paper.content;
            document.getElementById('readModal').showModal();
        }

        // 提交投稿
        async function submitPaper() {
            const title = document.getElementById('p-title').value.trim();
            const author = document.getElementById('p-author').value.trim();
            const abstract = document.getElementById('p-abstract').value.trim();
            const content = document.getElementById('p-content').value.trim();

            if (!title || !author || !content) {
                alert("标题、作者和正文不能为空！(科研不能造假到这种程度)");
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.innerText = "Submitting... / 上传中...";
            btn.disabled = true;

            const { error } = await _supabase.from('pit_papers').insert([
                { title, author, abstract: abstract || '作者很懒，没有摘要。', content, status: 'pending' }
            ]);

            btn.innerText = "Submit for Review / 提交盲审";
            btn.disabled = false;

            if (error) {
                alert("投稿失败！可能是查重率过高（网络问题）。");
                console.error(error);
            } else {
                alert("🎉 投稿成功！\n文章已进入同行评审（站长摸鱼）阶段，审核通过后即可在此处展示。");
                document.getElementById('submitModal').close();
                // 清空表单
                document.getElementById('p-title').value = '';
                document.getElementById('p-author').value = '';
                document.getElementById('p-abstract').value = '';
                document.getElementById('p-content').value = '';
            }
        }

        /* ================= 2. 论坛进度条逻辑 (保留) ================= */
        let globalForumData = [];

        async function fetchForumData() {
            const { data, error } = await _supabase.from('pit_forum').select('*').order('count', { ascending: false });
            if (!error) {
                globalForumData = data;
                document.getElementById('loading-msg').style.display = 'none';
                renderForum();
            }
        }

        function renderForum() {
            const container = document.getElementById('forum-container');
            container.innerHTML = '';
            globalForumData.forEach(item => {
                const progressPercent = Math.min((item.count / 250) * 100, 100);
                const hasCommented = localStorage.getItem(`pit_commented_${item.id}`);
                container.innerHTML += `
                    <div class="forum-module" onclick="toggleComment('${item.id}')">
                        <div style="font-weight: bold; font-size: 1.1rem;">${item.name}</div>
                        <div style="font-size: 0.9rem; margin-top: 5px;">全网总分数: <strong style="color: #8b0000;">-${item.count}</strong> / -250</div>
                        <div class="progress-container"><div class="progress-bar" style="width: ${progressPercent}%;"></div></div>
                        <div class="comment-section" id="comment_${item.id}" onclick="event.stopPropagation()">
                            <div class="comment-list"><strong style="color:#000;">最新破防语录:</strong><br>"${item.latest_comment || '暂无发疯记录。'}"</div>
                            <textarea id="input_${item.id}" rows="2" placeholder="${hasCommented ? '科研牛马请立刻回实验室刷烧杯。' : '记录你的翻车日常，坑深 -1...'}"></textarea>
                            <button id="btn_${item.id}" onclick="submitForum('${item.id}', ${item.count})" style="margin-top:10px;" ${hasCommented ? 'disabled' : ''}>
                                ${hasCommented ? '🤡 喜提延毕' : '🧱 纵身跳坑 -1'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        function toggleComment(id) {
            const sec = document.getElementById(`comment_${id}`);
            sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
        }

        async function submitForum(id, currentCount) {
            const text = document.getElementById(`input_${id}`).value.trim();
            if (!text) return;
            const newCount = currentCount >= 250 ? 250 : currentCount + 1;
            await _supabase.from('pit_forum').update({ count: newCount, latest_comment: text }).eq('id', id);
            localStorage.setItem(`pit_commented_${id}`, 'true');
            fetchForumData();
        }

        window.onload = () => {
            fetchPapers();
            fetchForumData();
        };
    </script>
</body>
</html>
